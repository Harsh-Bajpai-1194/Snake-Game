<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="author" content="Harsh Bajpai" />
  <meta name="description" content="A simple snake game with level select and custom colors." />
  <meta name="keywords" content="snake game, javascript game, html5 game, css game, level select, color choose" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <img id="introImage" src="image.png" alt="Intro Image" />
<!-- Snake Color Selection Overlay -->
<div id="colorSelectionOverlay">
  <h1>SELECT SNAKE COLOUR</h1>
  <div class="color-grid" id="colorGrid">
    <!-- Colors will be generated by JS -->
  </div>
</div>

<!-- Level Selection Overlay -->
<div id="levelOverlay">
  <button id="backToColors">⬅ Back to Colors</button>
  <h1>LEVEL SELECT</h1>
  <div class="level-grid" id="levelGrid"></div>
</div>
  <div id="gameUI">
    <div id="topbar">
      <span id="score">Score: 0</span>
      <span id="level">Level: 1</span>
    </div>
    <canvas id="game" width="400" height="400"></canvas>

    <div id="controls">
      <div class="control-row">
        <div class="btn" id="btnUp">⬆️</div>
      </div>
      <div class="control-row">
        <div class="btn" id="btnLeft">⬅️</div>
        <div class="btn" id="btnDown">⬇️</div>
        <div class="btn" id="btnRight">➡️</div>
      </div>
    </div>
  </div>

  <div id="gameOverScreen"></div>

  <script src="script.js"></script>
</body>
</html>
